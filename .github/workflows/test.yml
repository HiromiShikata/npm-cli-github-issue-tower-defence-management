name: Test

on:
  push:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci

      - name: Build native modules
        working-directory: node_modules/better-sqlite3
        run: node ../prebuild-install/bin.js || npm exec --yes -- node-gyp rebuild --release

      - name: Prepare
        run: npm run prepare

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test
        env:
          GH_TOKEN: ${{ secrets.TEST_GH_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.TEST_GOOGLE_SERVICE_ACCOUNT_KEY }}
          SLACK_USER_TOKEN: ${{ secrets.TEST_SLACK_USER_TOKEN }}
          DOTENV_CONFIG_QUIET: true

      - name: Upload test results
        uses: actions/upload-artifact@v7
        with:
          name: jest-junit-report
          path: reports/jest-junit

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: reports
